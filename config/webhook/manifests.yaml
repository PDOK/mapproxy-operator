---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-pdok-nl-v2-wmts
  failurePolicy: Fail
  name: vwfs-v3.kb.io
  rules:
  - apiGroups:
    - pdok.nl
    apiVersions:
    - v2
    operations:
    - CREATE
    - UPDATE
    resources:
    - wmts
  sideEffects: None
